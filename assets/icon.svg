<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="45" fill="#2c3e50"/>

  <!-- 网络连接图标 -->
  <!-- 节点 A -->
  <circle cx="25" cy="35" r="8" fill="#3498db"/>
  <text x="25" y="39" text-anchor="middle" fill="white" font-size="10" font-weight="bold">A</text>

  <!-- 节点 B -->
  <circle cx="75" cy="35" r="8" fill="#e74c3c"/>
  <text x="75" y="39" text-anchor="middle" fill="white" font-size="10" font-weight="bold">B</text>

  <!-- 节点 C -->
  <circle cx="25" cy="65" r="8" fill="#2ecc71"/>
  <text x="25" y="69" text-anchor="middle" fill="white" font-size="10" font-weight="bold">C</text>

  <!-- 节点 D -->
  <circle cx="75" cy="65" r="8" fill="#f39c12"/>
  <text x="75" y="69" text-anchor="middle" fill="white" font-size="10" font-weight="bold">D</text>

  <!-- 连接线 -->
  <line x1="33" y1="35" x2="67" y2="35" stroke="#ecf0f1" stroke-width="2"/>
  <line x1="25" y1="43" x2="25" y2="57" stroke="#ecf0f1" stroke-width="2"/>
  <line x1="75" y1="43" x2="75" y2="57" stroke="#ecf0f1" stroke-width="2"/>
  <line x1="33" y1="65" x2="67" y2="65" stroke="#ecf0f1" stroke-width="2"/>
  <line x1="33" y1="43" x2="67" y2="57" stroke="#ecf0f1" stroke-width="2" stroke-dasharray="4"/>
  <line x1="67" y1="43" x2="33" y2="57" stroke="#ecf0f1" stroke-width="2" stroke-dasharray="4"/>

  <!-- IP 标签 -->
  <text x="50" y="90" text-anchor="middle" fill="#ecf0f1" font-size="8" font-weight="bold">192.168.88.X</text>
</svg>
